<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>federal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', monospace;
        }
        
        body {
            background-color: #121212;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
        }
        
        .bg span {
            position: absolute;
            background: #cdbb8a;
            pointer-events: none;
            border-radius: 50%;
            animation: anim 8s linear infinite;
            opacity: 0.4;
        }
        
        @keyframes anim {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
                border-radius: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
            }
        }
        
        .box {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            z-index: 1;
        }
        
        .top {
            text-align: center;
            margin-bottom: 20px;
            animation: down 1s;
        }
        
        @keyframes down {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #cdbb8a;
            font-size: 4rem;
            margin-bottom: 10px;
            text-transform: lowercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(205, 187, 138, 0.5);
        }
        
        .bio {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: #aaaaaa;
            animation: fade 1.5s;
        }
        
        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .sec {
            width: 100%;
            border: 1px solid #cdbb8a;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 5px;
            background-color: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            animation: up 0.8s;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .sec:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(205, 187, 138, 0.2);
        }
        
        @keyframes up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .sec h2 {
            color: #cdbb8a;
            margin-bottom: 15px;
            font-size: 1.7rem;
            text-transform: lowercase;
            letter-spacing: 1px;
            display: inline-block;
            position: relative;
        }
        
        .sec h2::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #cdbb8a;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.5s;
        }
        
        .sec:hover h2::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        
        .links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
        }
        
        .link {
            display: block;
            padding: 12px 15px;
            background-color: #202020;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            border-radius: 4px;
            transition: all 0.3s;
            border: 1px solid #333333;
            font-size: 0.95rem;
        }
        
        .link:hover {
            background-color: #cdbb8a;
            color: #121212;
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }
        
        .dc {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }
        
        .tag {
            padding: 8px 15px;
            background-color: #202020;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #333333;
            transition: all 0.3s;
        }
        
        .tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
            background-color: #272727;
        }
        
        .name {
            font-weight: bold;
        }
        
        .status {
            color: #cdbb8a;
            font-size: 0.8rem;
            padding: 2px 6px;
            background-color: rgba(205, 187, 138, 0.1);
            border-radius: 3px;
        }
        
        .sus {
            color: #ff6b6b;
            background-color: rgba(255, 107, 107, 0.1);
        }
        
        .srv {
            padding: 12px 20px;
            background-color: #202020;
            border-radius: 4px;
            text-align: center;
            width: 100%;
            border: 1px solid #333333;
            transition: all 0.3s;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .srv::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(205, 187, 138, 0.1), transparent);
            transition: 0.5s;
        }
        
        .srv:hover::before {
            left: 100%;
        }
        
        .srv a {
            color: #cdbb8a;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            position: relative;
        }
        
        .srv a:hover {
            text-shadow: 0 0 5px rgba(205, 187, 138, 0.5);
        }
        
        footer {
            text-align: center;
            margin-top: auto;
            padding: 20px;
            color: #666666;
            font-size: 0.9rem;
            animation: fade 2s;
        }
        
        @media (max-width: 600px) {
            .box {
                padding: 20px 10px;
            }
            
            h1 {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg" id="bg"></div>
    
    <div class="box">
        <div class="top">
            <h1>federal</h1>
            <div class="bio">17 // software developer</div>
        </div>
        
        <div class="sec">
            <h2>Links</h2>
            <div class="links">
                <a href="https://juggi.ng/federal" class="link" target="_blank">juggi.ng/federal</a>
                <a href="https://silenced.rip/federal" class="link" target="_blank">silenced.rip/federal</a>
                <a href="https://suicides.live/federal" class="link" target="_blank">suicides.live/federal</a>
                <a href="https://fakecrime.bio/federal" class="link" target="_blank">fakecrime.bio/federal</a>
                <a href="https://ammo.lol/federal" class="link" target="_blank">ammo.lol/federal</a>
                <a href="https://guns.lol/moneyrun" class="link" target="_blank">guns.lol/moneyrun</a>
                <a href="https://federal.wtf" class="link" target="_blank">federal.wtf</a>
            </div>
        </div>
        
        <div class="sec">
            <h2>Discord</h2>
            <div class="dc">
                <div class="tags">
                    <div class="tag">
                        <span class="name">0x260</span>
                        <span class="status">main</span>
                    </div>
                    <div class="tag">
                        <span class="name">0x270</span>
                        <span class="status">alt</span>
                    </div>
                </div>
                
                <div class="tags" style="margin-top: 15px;">
                    <div class="tag">
                        <span class="name">moneyrun</span>
                        <span class="status sus">suspended</span>
                    </div>
                    <div class="tag">
                        <span class="name">moneyrunfed</span>
                        <span class="status sus">suspended</span>
                    </div>
                </div>
                
                <div class="srv">
                    <a href="https://discord.gg/FazWanUUBE" target="_blank">discord.gg/FazWanUUBE</a>
                </div>
            </div>
        </div>
    </div>
    
    <footer>
        &copy; 2025 federal
    </footer>
    
    <script>
        function init() {
            const bg = document.getElementById('bg');
            const n = 25;
            
            for (let i = 0; i < n; i++) {
                const s = document.createElement('span');
                
                const size = Math.random() * 40 + 10;
                const x = Math.random() * 100;
                const dur = Math.random() * 15 + 8;
                const delay = Math.random() * 5;
                
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.left = x + '%';
                s.style.bottom = '-100px';
                s.style.animationDuration = dur + 's';
                s.style.animationDelay = delay + 's';
                
                bg.appendChild(s);
            }
        }
        
        init();
        
        document.querySelectorAll('.link').forEach(l => {
            l.addEventListener('mouseenter', () => {
                l.style.transform = 'translateY(-2px) scale(1.05)';
            });
            
            l.addEventListener('mouseleave', () => {
                l.style.transform = '';
            });
        });
    </script>
</body>
</html>
